<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;900&display=swap" rel="stylesheet">
  <title>Mesto</title>
  <script type="module" crossorigin src="./assets/index-D0Z5ihd7.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-tTVY_CNP.css">
</head>
<body class="page">
  <div class="page__content">
    <header class="header page__section">
      <img src="./assets/logo-C_QQpFK1.svg" alt="Логотип Mesto" class="header__logo">
    </header>

    <main class="content">
      <section class="profile page__section">
        <div class="profile__image">
          <img src="" alt="Аватар" class="profile__avatar">
          <div class="profile__overlay"></div>
        </div>
        <div class="profile__info">
          <div class="profile__name-wrap">
            <h1 class="profile__title"></h1>
            <button type="button" class="profile__edit-button" aria-label="Редактировать профиль"></button>
          </div>
          <p class="profile__description"></p>
        </div>
        <button type="button" class="profile__add-button" aria-label="Добавить место"></button>
      </section>

      <section class="places page__section">
        <ul class="places__list"></ul>
      </section>
    </main>

    <footer class="footer page__section">
      <p class="footer__copyright">© 2025 Mesto Russia</p>
    </footer>
  </div>

  <div class="popup popup_type_edit">
    <div class="popup__content">
      <button type="button" class="popup__close" aria-label="Закрыть"></button>
      <h3 class="popup__title">Редактировать профиль</h3>
      <form class="popup__form" name="edit-profile" novalidate>
        <label class="popup__label">
          <input type="text" name="name" id="profile-name" class="popup__input popup__input_type_name" placeholder="Имя" required minlength="2" maxlength="40" pattern="^[a-zA-Zа-яА-Я\s\-]+$" data-error-message="Разрешены только латинские, кириллические буквы, знаки дефиса и пробелы">
          <span class="popup__error profile-name-error" id="profile-name-error"></span>
        </label>
        <label class="popup__label">
          <input type="text" name="description" id="profile-description" class="popup__input popup__input_type_description" placeholder="О себе" required minlength="2" maxlength="200" pattern="^[a-zA-Zа-яА-Я\s\-]+$" data-error-message="Разрешены только латинские, кириллические буквы, знаки дефиса и пробелы">
          <span class="popup__error profile-description-error" id="profile-description-error"></span>
        </label>
        <button type="submit" class="popup__button">Сохранить</button>
      </form>
    </div>
  </div>

  <div class="popup popup_type_new-card">
    <div class="popup__content">
      <button type="button" class="popup__close" aria-label="Закрыть"></button>
      <h3 class="popup__title">Новое место</h3>
      <form class="popup__form" name="new-place" novalidate>
        <label class="popup__label">
          <input type="text" name="place-name" id="place-name" class="popup__input popup__input_type_card-name" placeholder="Название" required minlength="2" maxlength="30" pattern="^[a-zA-Zа-яА-Я\s\-]+$" data-error-message="Разрешены только латинские, кириллические буквы, знаки дефиса и пробелы">
          <span class="popup__error place-name-error" id="place-name-error"></span>
        </label>
        <label class="popup__label">
          <input type="url" name="link" id="place-link" class="popup__input popup__input_type_url" placeholder="Ссылка на картинку" required>
          <span class="popup__error place-link-error" id="place-link-error"></span>
        </label>
        <button type="submit" class="popup__button">Создать</button>
      </form>
    </div>
  </div>

  <div class="popup popup_type_image">
    <div class="popup__content popup__content_content_image">
      <button type="button" class="popup__close" aria-label="Закрыть"></button>
      <img src="" alt="" class="popup__image">
      <p class="popup__caption"></p>
    </div>
  </div>

  <div class="popup popup_type_edit-avatar">
    <div class="popup__content">
      <button type="button" class="popup__close" aria-label="Закрыть"></button>
      <h3 class="popup__title">Обновить аватар</h3>
      <form class="popup__form" name="edit-avatar" novalidate>
        <label class="popup__label">
          <input type="url" name="avatar-link" id="avatar-link" class="popup__input" placeholder="Ссылка на аватар" required>
          <span class="popup__error avatar-link-error" id="avatar-link-error"></span>
        </label>
        <button type="submit" class="popup__button">Сохранить</button>
      </form>
    </div>
  </div>

  <div class="popup popup_type_confirm">
    <div class="popup__content">
      <button type="button" class="popup__close" aria-label="Закрыть"></button>
      <h3 class="popup__title popup__title_type_confirm">Вы уверены?</h3>
      <button type="button" class="popup__button popup__button_type_confirm">Да</button>
    </div>
  </div>

  <div class="popup popup_type_info">
    <div class="popup__content popup__content_content_info">
      <button type="button" class="popup__close" aria-label="Закрыть"></button>
      <h3 class="popup__title">Статистикa карточек</h3>
      <dl class="popup__info"></dl>
      <h4 class="popup__text"></h4>
      <ul class="popup__list"></ul>
    </div>
  </div>


  <template id="card-template">
    <li class="places__item card">
      <img src="" alt="" class="card__image">
      <div class="card__control">
        <button type="button" class="card__control-button card__control-button_type_info" aria-label="Информация"></button>
        <button type="button" class="card__control-button card__control-button_type_delete" aria-label="Удалить"></button>
      </div>
      <div class="card__description">
        <h2 class="card__title"></h2>
        <div class="card__like">
          <button type="button" class="card__like-button" aria-label="Нравится"></button>
          <span class="card__like-count">0</span>
        </div>
      </div>
    </li>
  </template>

  <template id="popup-info-definition-template">
    <div class="popup__info-item">
      <dt class="popup__info-term"></dt>
      <dd class="popup__info-description"></dd>
    </div>
  </template>

  <template id="popup-info-user-preview-template">
    <li class="popup__list-item popup__list-item_type_badge"></li>
  </template>
</body>
</html>
